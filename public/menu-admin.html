<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Quản lý thực đơn</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
}

header{

    background:#ff6b00;

    color:white;

    padding:20px;

    text-align:center;

    font-size:28px;

    font-weight:bold;

}

.container{

    max-width:1200px;

    margin:30px auto;

    padding:20px;

}

.form{

    background:white;

    padding:20px;

    border-radius:12px;

    margin-bottom:25px;

    box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.form h2{

    margin-bottom:20px;

}

input{

    width:100%;

    padding:12px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:8px;

}

button{

    border:none;

    cursor:pointer;

    padding:10px 18px;

    border-radius:8px;

}

#saveBtn{

    background:#ff6b00;

    color:white;

    width:100%;

    font-size:18px;

}

.grid{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));

    gap:20px;

}

.card{

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.card img{

    width:100%;

    height:170px;

    object-fit:cover;

}

.info{

    padding:15px;

}

.price{

    color:red;

    font-size:20px;

    font-weight:bold;

    margin:10px 0;

}

.actions{

    display:flex;

    gap:10px;

}

.edit{

    flex:1;

    background:#0d6efd;

    color:white;

}

.delete{

    flex:1;

    background:#dc3545;

    color:white;

}
.back-btn{
    background:#0d6efd;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

.back-btn:hover{
    background:#0b5ed7;
    transform:translateY(-2px);
}
</style>

</head>

<body>

<header>

🍽️ Quản lý thực đơn

</header>
<div style="padding:20px;">
    <button onclick="goBack()" class="back-btn">
        ← Quay lại Quản lý đơn hàng
    </button>
</div>
<div class="container">

<div class="form">

<h2 id="title">Thêm món ăn</h2>

<input id="name" placeholder="Tên món">

<input id="price" type="number" placeholder="Giá">

<input
type="file"
id="image"
accept="image/*">

<input id="category" placeholder="Danh mục">

<button id="saveBtn">

Lưu

</button>

</div>

<div class="grid" id="grid"></div>

</div>

<script>

let editing=null;

async function loadMenu(){

    const res=await fetch("/api/menu");

    const foods=await res.json();

    let html="";

    foods.forEach(food=>{

        html+=`

<div class="card">

<img src="${food.img||food.image}">

<div class="info">

<h3>${food.name}</h3>

<div class="price">

${Number(food.price || 0).toLocaleString()} đ

</div>

<p>${food.category}</p>

<br>

<div class="actions">

<button class="edit"

onclick='editFood(${JSON.stringify(food)})'>

Sửa

</button>

<button class="delete"

onclick="deleteFood('${food._id}')">

Xóa

</button>

</div>

</div>

</div>

`;

    });

    grid.innerHTML=html;

}

loadMenu();

saveBtn.onclick=async()=>{

    const nameInput = document.getElementById("name");
    const priceInput = document.getElementById("price");
    const categoryInput = document.getElementById("category");
    const imageInput = document.getElementById("image");

    const form = new FormData();

    form.append("name", nameInput.value);
    form.append("price", priceInput.value);
    form.append("category", categoryInput.value);

    if(imageInput.files.length > 0){
        form.append("image", imageInput.files[0]);
    }

    if(editing){

        await fetch("/api/menu/"+editing,{

            method:"PUT",

            headers:{

                "Content-Type":"application/json"

            },

            body:form

        });

    }else{

        await fetch("/api/menu",{

            method:"POST",

           

            body:form

        });

    }

    editing=null;

    title.innerHTML="Thêm món ăn";

    name.value="";

    price.value="";

    image.value="";

    category.value="";

    loadMenu();

}

function editFood(food){

    editing=food._id;

    title.innerHTML="Sửa món";

    name.value=food.name;

    price.value=food.price;

    image.value=food.img||food.image;

    category.value=food.category;

}

async function deleteFood(id){

    if(!confirm("Xóa món này?")) return;

    await fetch("/api/menu/"+id,{

        method:"DELETE"

    });

    loadMenu();

}
function goBack(){
    window.location.href = "/admin.html";
}
</script>

</body>

</html>
