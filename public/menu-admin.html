<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fffaf5">
    <title>Quản lý thực đơn</title>
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #c94f0a;
            --ink: #392a22;
            --muted: #7b6a61;
            --line: #efe2da;
            --surface: #fff;
            --page: #fffaf5;
            --shadow: 0 8px 24px rgba(106, 72, 50, .07);
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: var(--page); color: var(--ink); font-family: "Segoe UI", Arial, sans-serif; }
        button, input { font: inherit; }

        .app-header { color: var(--ink); background: rgba(255,255,255,.94); border-bottom: 1px solid var(--line); box-shadow: 0 4px 18px rgba(106,72,50,.06); backdrop-filter: blur(12px); }
        .header-inner, main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
        .header-inner { min-height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 42px; height: 42px; display: grid; place-items: center; border-radius: 13px; background: #fff0e4; font-size: 22px; }
        .brand h1 { margin: 0; font-size: 21px; }
        .brand p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
        .back-btn { padding: 11px 16px; border: 1px solid #ffd6bd; border-radius: 11px; background: #fff4eb; color: var(--primary-dark); cursor: pointer; font-weight: 700; }

        main { padding: 28px 0 42px; }
        .page-heading { margin-bottom: 18px; }
        .page-heading h2 { margin: 0 0 5px; font-size: 25px; }
        .page-heading p { margin: 0; color: var(--muted); font-size: 14px; }
        .layout { display: grid; grid-template-columns: 350px minmax(0, 1fr); gap: 22px; align-items: start; }

        .form-card { position: sticky; top: 20px; padding: 22px; border: 1px solid var(--line); border-radius: 17px; background: var(--surface); box-shadow: var(--shadow); }
        .form-card h3 { margin: 0 0 5px; font-size: 20px; }
        .form-hint { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 700; }
        input[type="text"], input[type="number"] { width: 100%; height: 46px; padding: 0 13px; border: 1px solid #e6d7ce; border-radius: 10px; outline: none; color: var(--ink); background: #fff; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
        .file-control { display: block; padding: 12px; border: 1px dashed #ddc9bc; border-radius: 10px; background: #fffaf6; color: var(--muted); font-size: 13px; }
        input[type="file"] { width: 100%; font-size: 13px; }
        input[type="file"]::file-selector-button { margin-right: 9px; padding: 8px 10px; border: 0; border-radius: 8px; color: var(--primary-dark); background: #ffeddc; cursor: pointer; font-weight: 700; }
        .preview { width: 100%; height: 135px; display: none; margin-top: 10px; border-radius: 10px; object-fit: cover; }
        .form-actions { display: flex; gap: 9px; margin-top: 20px; }
        .save-btn, .cancel-btn { min-height: 46px; border: 0; border-radius: 10px; cursor: pointer; font-weight: 750; }
        .save-btn { flex: 1; color: #fff; background: var(--primary); box-shadow: 0 5px 12px rgba(249,115,22,.2); }
        .save-btn:hover { background: var(--primary-dark); }
        .save-btn:disabled { opacity: .65; cursor: wait; }
        .cancel-btn { display: none; padding: 0 14px; color: var(--muted); background: #f4ece7; }
        .message { display: none; margin-top: 12px; padding: 10px 12px; border-radius: 9px; font-size: 13px; }
        .message.success { display: block; color: #047857; background: #d1fae5; }
        .message.error { display: block; color: #b42318; background: #fee4e2; }

        .menu-section { min-width: 0; }
        .menu-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 13px; }
        .menu-toolbar h3 { margin: 0; font-size: 18px; }
        .menu-count { padding: 6px 10px; border-radius: 999px; color: var(--muted); background: #f4ece7; font-size: 12px; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
        .food-card { overflow: hidden; border: 1px solid var(--line); border-radius: 16px; background: var(--surface); box-shadow: var(--shadow); }
        .food-card.sold-out img { filter: grayscale(.65); opacity: .72; }
        .food-image { position: relative; height: 170px; overflow: hidden; background: #f3ebe5; }
        .food-image img { width: 100%; height: 100%; display: block; object-fit: cover; transition: transform .3s; }
        .food-card:hover .food-image img { transform: scale(1.03); }
        .category { position: absolute; left: 11px; bottom: 11px; max-width: calc(100% - 22px); padding: 6px 9px; overflow: hidden; border-radius: 999px; color: #fff; background: rgba(67,45,33,.72); backdrop-filter: blur(5px); text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 700; }
        .availability-badge { position: absolute; right: 10px; top: 10px; padding: 6px 9px; border-radius: 999px; color: #047857; background: rgba(236,253,245,.94); font-size: 11px; font-weight: 800; }
        .availability-badge.sold-out { color: #b42318; background: rgba(254,228,226,.95); }
        .food-info { padding: 15px; }
        .food-info h4 { min-height: 44px; margin: 0 0 8px; font-size: 16px; line-height: 1.35; }
        .price { margin-bottom: 14px; color: var(--primary-dark); font-size: 20px; font-weight: 800; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .edit, .delete, .availability-toggle { min-height: 40px; border: 0; border-radius: 9px; cursor: pointer; font-weight: 700; }
        .edit { color: #1d4ed8; background: #eaf2ff; }
        .delete { color: #b42318; background: #feeceb; }
        .availability-toggle { grid-column: 1 / -1; color: #047857; background: #e7f8f1; }
        .availability-toggle.stop { color: #9a4b0a; background: #fff1df; }
        .empty-state { grid-column: 1 / -1; padding: 50px 20px; border: 1px dashed #ddc9bc; border-radius: 16px; text-align: center; color: var(--muted); background: rgba(255,255,255,.82); }
        .empty-state span { display: block; margin-bottom: 8px; font-size: 34px; }

        @media (max-width: 820px) {
            .layout { grid-template-columns: 1fr; }
            .form-card { position: static; }
        }
        @media (max-width: 600px) {
            .header-inner, main { width: min(100% - 24px, 1180px); }
            .header-inner { min-height: 68px; }
            .brand p { display: none; }
            .brand h1 { font-size: 18px; }
            .brand-icon { width: 38px; height: 38px; }
            .back-btn { padding: 10px 12px; font-size: 13px; }
            main { padding-top: 20px; }
            .page-heading h2 { font-size: 21px; }
            .form-card { padding: 18px; }
            .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .food-image { height: 130px; }
            .food-info { padding: 12px; }
            .food-info h4 { min-height: 40px; font-size: 14px; }
            .price { font-size: 17px; }
            .actions { grid-template-columns: 1fr; }
        }
        @media (max-width: 370px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">🍽️</div>
                <div><h1>Quản lý thực đơn</h1><p>Thêm, sửa và sắp xếp món ăn</p></div>
            </div>
            <button class="back-btn" onclick="location.href='/admin.html'">← Đơn hàng</button>
        </div>
    </header>

    <main>
        <div class="page-heading"><h2>Thực đơn của quán</h2><p>Thông tin rõ ràng giúp khách hàng chọn món nhanh hơn.</p></div>
        <div class="layout">
            <section class="form-card">
                <h3 id="title">Thêm món mới</h3>
                <p class="form-hint" id="formHint">Điền đầy đủ thông tin của món ăn.</p>
                <div class="field"><label for="name">Tên món</label><input id="name" type="text" placeholder="Ví dụ: Cà phê sữa đá" autocomplete="off"></div>
                <div class="field"><label for="price">Giá bán</label><input id="price" type="number" min="0" step="1000" placeholder="Ví dụ: 35000" inputmode="numeric"></div>
                <div class="field"><label for="category">Danh mục</label><input id="category" type="text" placeholder="Ví dụ: Đồ uống" autocomplete="off"></div>
                <div class="field">
                    <label for="image">Hình ảnh</label>
                    <div class="file-control"><input id="image" type="file" accept="image/*"></div>
                    <img class="preview" id="preview" alt="Xem trước hình món ăn">
                </div>
                <div class="form-actions"><button class="cancel-btn" id="cancelBtn" type="button">Hủy</button><button class="save-btn" id="saveBtn" type="button">Lưu món</button></div>
                <div class="message" id="message" role="status"></div>
            </section>

            <section class="menu-section">
                <div class="menu-toolbar"><h3>Danh sách món</h3><span class="menu-count" id="menuCount">0 món</span></div>
                <div class="grid" id="grid"><div class="empty-state"><span>⏳</span>Đang tải thực đơn...</div></div>
            </section>
        </div>
    </main>

    <script>
        let editing = null;
        let currentImage = "";
        const nameInput = document.getElementById("name");
        const priceInput = document.getElementById("price");
        const categoryInput = document.getElementById("category");
        const imageInput = document.getElementById("image");
        const preview = document.getElementById("preview");
        const saveBtn = document.getElementById("saveBtn");
        const cancelBtn = document.getElementById("cancelBtn");

        const escapeHtml = (value = "") => String(value).replace(/[&<>'"]/g, char => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
        })[char]);

        async function loadMenu() {
            try {
                const res = await fetch("/api/menu");
                if (!res.ok) throw new Error();
                const foods = await res.json();
                document.getElementById("menuCount").textContent = `${foods.length} món`;
                if (!foods.length) {
                    grid.innerHTML = '<div class="empty-state"><span>🍽️</span>Chưa có món ăn. Hãy thêm món đầu tiên.</div>';
                    return;
                }
                grid.innerHTML = foods.map(food => {
                    const foodData = encodeURIComponent(JSON.stringify(food));
                    const imageUrl = food.img || food.image || "";
                    const available = food.available !== false;
                    return `<article class="food-card ${available ? "" : "sold-out"}">
                        <div class="food-image">
                            <img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(food.name)}" onerror="this.style.opacity='.25'">
                            <span class="category">${escapeHtml(food.category || "Chưa phân loại")}</span>
                            <span class="availability-badge ${available ? "" : "sold-out"}">${available ? "Còn món" : "Hết món"}</span>
                        </div>
                        <div class="food-info">
                            <h4>${escapeHtml(food.name)}</h4>
                            <div class="price">${Number(food.price || 0).toLocaleString("vi-VN")} đ</div>
                            <div class="actions">
                                <button class="edit" onclick="editFood(decodeURIComponent('${foodData}'))">Sửa</button>
                                <button class="delete" onclick="deleteFood('${escapeHtml(food._id)}')">Xóa</button>
                                <button class="availability-toggle ${available ? "stop" : ""}" onclick="toggleAvailability('${escapeHtml(food._id)}', ${!available})">${available ? "Tạm hết món" : "Mở bán lại"}</button>
                            </div>
                        </div>
                    </article>`;
                }).join("");
            } catch {
                grid.innerHTML = '<div class="empty-state"><span>⚠️</span>Không tải được thực đơn. Vui lòng thử lại.</div>';
            }
        }

        imageInput.addEventListener("change", () => {
            const file = imageInput.files[0];
            if (!file) return;
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        });

        saveBtn.addEventListener("click", async () => {
            const name = nameInput.value.trim();
            const price = priceInput.value;
            const category = categoryInput.value.trim();
            if (!name || !price || !category) return showMessage("Vui lòng nhập tên món, giá và danh mục.", "error");
            if (!editing && !imageInput.files[0]) return showMessage("Vui lòng chọn hình ảnh cho món mới.", "error");

            const form = new FormData();
            form.append("name", name);
            form.append("price", price);
            form.append("category", category);
            if (imageInput.files[0]) form.append("image", imageInput.files[0]);

            saveBtn.disabled = true;
            saveBtn.textContent = "Đang lưu...";
            try {
                const url = editing ? `/api/menu/${editing}` : "/api/menu";
                const res = await fetch(url, { method: editing ? "PUT" : "POST", body: form });
                if (!res.ok) throw new Error();
                showMessage(editing ? "Đã cập nhật món ăn." : "Đã thêm món mới.", "success");
                resetForm();
                loadMenu();
            } catch {
                showMessage("Không thể lưu món ăn. Vui lòng thử lại.", "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = editing ? "Cập nhật món" : "Lưu món";
            }
        });

        function editFood(encodedFood) {
            const food = JSON.parse(encodedFood);
            editing = food._id;
            currentImage = food.img || food.image || "";
            document.getElementById("title").textContent = "Chỉnh sửa món";
            document.getElementById("formHint").textContent = "Cập nhật thông tin bạn muốn thay đổi.";
            nameInput.value = food.name || "";
            priceInput.value = food.price || "";
            categoryInput.value = food.category || "";
            preview.src = currentImage;
            preview.style.display = currentImage ? "block" : "none";
            cancelBtn.style.display = "block";
            saveBtn.textContent = "Cập nhật món";
            document.querySelector(".form-card").scrollIntoView({ behavior: "smooth", block: "start" });
        }

        cancelBtn.addEventListener("click", resetForm);

        function resetForm() {
            editing = null;
            currentImage = "";
            nameInput.value = "";
            priceInput.value = "";
            categoryInput.value = "";
            imageInput.value = "";
            preview.removeAttribute("src");
            preview.style.display = "none";
            cancelBtn.style.display = "none";
            saveBtn.textContent = "Lưu món";
            document.getElementById("title").textContent = "Thêm món mới";
            document.getElementById("formHint").textContent = "Điền đầy đủ thông tin của món ăn.";
        }

        async function deleteFood(id) {
            if (!confirm("Bạn có chắc muốn xóa món này?")) return;
            const res = await fetch(`/api/menu/${encodeURIComponent(id)}`, { method: "DELETE" });
            if (res.ok) { showMessage("Đã xóa món ăn.", "success"); loadMenu(); }
            else showMessage("Không thể xóa món ăn.", "error");
        }

        async function toggleAvailability(id, available) {
            try {
                const res = await fetch(`/api/menu/${encodeURIComponent(id)}/availability`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ available })
                });
                if (!res.ok) throw new Error();
                showMessage(available ? "Món đã được mở bán lại." : "Món đã chuyển sang hết món.", "success");
                loadMenu();
            } catch {
                showMessage("Không thể cập nhật trạng thái món.", "error");
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById("message");
            message.textContent = text;
            message.className = `message ${type}`;
        }

        loadMenu();
    </script>
</body>
</html>
