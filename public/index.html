<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Menu Nhà Hàng</title>
    <style>
        *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:"Segoe UI",Arial,sans-serif;
}


body{

    background:#fafafa;

    color:#333;

    padding-bottom:80px;

}



/* HEADER */

header{

    background:linear-gradient(135deg,#ff7a00,#ff4500);

    color:white;

    padding:20px;

    text-align:center;

    font-size:24px;

    font-weight:700;

    position:sticky;

    top:0;

    z-index:100;

    box-shadow:0 4px 15px rgba(0,0,0,.15);

}



/* thông tin bàn */


body>div:nth-of-type(2){

    background:white;

    margin:12px;

    border-radius:15px;

    padding:15px!important;

    box-shadow:0 3px 10px rgba(0,0,0,.08);

}



#tableNumber{

    color:#ff6b00;

}



#customerNameShow{

    color:#333;

}



/* search */

.search{

    padding:12px;

}


.search input{

    width:100%;

    padding:14px 18px;

    border-radius:30px;

    border:1px solid #ddd;

    outline:none;

    font-size:16px;

    background:white;

}



/* MENU GRID */


.grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:12px;

    padding:12px;

}



.card{

    background:white;

    border-radius:18px;

    overflow:hidden;

    box-shadow:0 4px 12px rgba(0,0,0,.08);

    transition:.2s;

}



.card:active{

    transform:scale(.96);

}



.card img{

    width:100%;

    height:140px;

    object-fit:cover;

}



.info{

    padding:12px;

}



.info h3{

    font-size:17px;

    margin-bottom:8px;

    height:42px;

}



.price{

    color:#ff5500;

    font-size:17px;

    font-weight:700;

    margin-bottom:10px;

}



/* BUTTON */

button{

    border:none;

    background:#ff6b00;

    color:white;

    padding:12px;

    border-radius:12px;

    font-weight:bold;

    cursor:pointer;

}



.card button{

    width:100%;

}



/* CART */

.cart{

    position:fixed;

    bottom:0;

    left:0;

    right:0;

    background:white;

    padding:12px 16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    box-shadow:0 -5px 20px rgba(0,0,0,.15);

    z-index:999;

}



.cart button{

    width:auto!important;

    padding:12px 22px!important;

}



/* MODAL */

.modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.65);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

}



.modal-box{

    width:90%;

    background:white;

    border-radius:25px;

    padding:30px 20px;

    text-align:center;

    animation:show .3s;

}



@keyframes show{

    from{

        transform:translateY(50px);

        opacity:0;

    }

    to{

        transform:none;

        opacity:1;

    }

}



.modal-box h2{

    color:#ff6b00;

    margin-bottom:10px;

}



.modal-box input{

    width:100%;

    padding:15px;

    border-radius:15px;

    border:1px solid #ddd;

    margin:10px 0;

    text-align:center;

    font-size:17px;

}



.modal-box button{

    width:100%;

    margin-top:15px;

    padding:15px;

    font-size:18px;

}



/* MOBILE */

@media(max-width:400px){

    .grid{

        grid-template-columns:1fr 1fr;

        gap:10px;

    }


    .card img{

        height:120px;

    }


    .info h3{

        font-size:15px;

    }

}
    </style>
</head>

<body>
    <div id="tableModal" class="modal">

    <div class="modal-box">

        <h2>🍽️ Chào mừng</h2>
        <p>Nhập tên của bạn</p>

        <input
            type="text"
            id="customerName"
            placeholder="Ví dụ: Nguyễn Văn A"
        >
        <p>Vui lòng nhập số bàn</p>

        <input
            type="number"
            id="tableInput"
            placeholder="Ví dụ: 12"
        >

        <button id="startOrder">
            Bắt đầu gọi món
        </button>

    </div>

</div>
    <header>🍽️ MENU NHÀ HÀNG</header>
    <div style="background:#fff;padding:10px;text-align:center;font-weight:bold">
    🪑 Bàn: <span id="tableNumber"></span> <div style="font-size:18px;font-weight:bold">
        👤 <span id="customerNameShow"></span>
    </div>
    <button onclick="changeTable()" style="width:auto;margin-left:10px;padding:5px 10px">
        Đổi bàn
    </button>
</div>
    <div class="search"><input id="search" placeholder="Tìm món..."></div>
    <div class="grid" id="grid"></div>
    <div class="cart">
        <div><b id="count">0</b> món - <b id="total">0đ</b></div><button style="width:auto;padding:10px 18px" onclick="placeOrder()">Đặt đơn
            hàng</button>
    </div>
    <script>
        const modal = document.getElementById("tableModal");
        const tableInput = document.getElementById("tableInput");   
        const startBtn = document.getElementById("startOrder");
        const savedTable = localStorage.getItem("table");
        const customerName = document.getElementById("customerName");
        const tableNumber = document.getElementById("tableNumber");
        const savedName = localStorage.getItem("customerName");
        const customerNameShow = document.getElementById("customerNameShow");
                    if(savedName){
                customerNameShow.textContent = savedName;
            }
            if(savedTable && savedName){

    tableNumber.textContent = savedTable;

    customerNameShow.textContent = savedName;

    modal.style.display = "none";

}
            if(savedTable){
                tableNumber.textContent = savedTable;
            }
            if(savedTable){

                modal.style.display="none";

            }
        startBtn.onclick = () => {

            const table = tableInput.value.trim();
            const name = customerName.value.trim();
             console.log(name); 
            if(name === ""){
                alert("Vui lòng nhập tên");
                return;
            }
            if(table===""){

                alert("Vui lòng nhập số bàn");

                return;

            }
            localStorage.setItem("customerName", name);
            localStorage.setItem("table",table);
            customerNameShow.textContent = name;
            tableNumber.textContent = table;
            modal.style.display="none";

        };
        let foods = [];
        let cart = {};
        async function loadMenu() {

    try {

        const res = await fetch("/api/menu");

        foods = await res.json();

        render(foods);

    } catch (err) {

        console.log(err);

        alert("Không tải được menu");

    }

}
        function render(list){

    grid.innerHTML="";

    list.forEach(food=>{

        grid.innerHTML+=`

        <div class="card">

            <img src="${food.img || food.image}">

            <div class="info">

                <h3>${food.name}</h3>

                <div class="price">

                    ${food.price.toLocaleString()}đ

                </div>

                <br>

                <button onclick="add('${food._id}')">

                    Thêm

                </button>

            </div>

        </div>

        `;

    });

}
        function changeTable(){

            localStorage.removeItem("table");
                localStorage.removeItem("customerName");
            location.reload();

        }
        function add(id){

    const food = foods.find(f => f._id === id);

    if(!food) return;

    cart[id] ??= {

        food,

        qty:0

    };

    cart[id].qty++;

    updateCart();

}
        search.oninput = e => {
            const k = e.target.value.toLowerCase();
            render(foods.filter(f => f.name.toLowerCase().includes(k)));
        }
        loadMenu();
        async function placeOrder(){

    if(Object.keys(cart).length===0){

        alert("Chưa chọn món");

        return;

    }

  


    const items = Object.values(cart).map(item => ({
    id: item.food._id,
    name: item.food.name,
    qty: item.qty,
    price: item.food.price
}));

const totalMoney = Object.values(cart).reduce(
    (sum, item) => sum + item.qty * item.food.price,
    0
);

    const res=await fetch("/api/orders",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            customer: localStorage.getItem("customerName"),
            table:localStorage.getItem("table"),

            note:"",

            items,

            total:totalMoney

        })

    });

    const data=await res.json();

    if(data.success){

    alert("Đặt món thành công!");

    cart = {};
    updateCart();

    count.textContent = 0;

    total.textContent = "0đ";
           location.href="/my-order.html";
}else{

    alert("Đặt món thất bại");

}

}
function updateCart(){

    let countItem = 0;

    let money = 0;

    Object.values(cart).forEach(item=>{

        countItem += item.qty;

        money += item.qty * item.food.price;

    });

    count.textContent = countItem;

    total.textContent = money.toLocaleString()+"đ";

}
    </script>
</body>

</html>
