<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quản lý đơn">
    <link rel="manifest" href="/admin-manifest.webmanifest">
    <link rel="icon" href="/admin-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/admin-icon.svg">
    <title>Quản lý đơn hàng</title>
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --ink: #172033;
            --muted: #667085;
            --line: #e7eaf0;
            --surface: #ffffff;
            --page: #f6f7fb;
            --shadow: 0 8px 24px rgba(23, 32, 51, .08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--page);
            color: var(--ink);
            font-family: "Segoe UI", Arial, sans-serif;
        }

        button { font: inherit; }

        .app-header {
            color: #fff;
            background: linear-gradient(135deg, #fb7c21, #f15a0a);
            box-shadow: 0 4px 18px rgba(234, 88, 12, .22);
        }

        .header-inner,
        main {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
        }

        .header-inner {
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 13px;
            background: rgba(255, 255, 255, .18);
            font-size: 22px;
        }
        .brand h1 { margin: 0; font-size: 21px; }
        .brand p { margin: 3px 0 0; opacity: .85; font-size: 13px; }

        .header-btn,
        .refresh-btn,
        .action-btn {
            border: 0;
            cursor: pointer;
            font-weight: 700;
            transition: transform .18s, box-shadow .18s, background .18s;
        }

        .header-btn:hover,
        .refresh-btn:hover,
        .action-btn:hover { transform: translateY(-1px); }

        .header-btn {
            padding: 11px 16px;
            border-radius: 11px;
            background: #fff;
            color: var(--primary-dark);
        }

        main { padding: 28px 0 40px; }

        .page-heading {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        .page-heading h2 { margin: 0 0 5px; font-size: 25px; }
        .page-heading p { margin: 0; color: var(--muted); font-size: 14px; }

        .refresh-btn {
            padding: 11px 15px;
            border: 1px solid var(--line);
            border-radius: 11px;
            background: var(--surface);
            color: var(--ink);
        }

        .notification-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
            padding: 13px 15px;
            border: 1px solid #fed7aa;
            border-radius: 13px;
            color: #9a4b0a;
            background: #fff7ed;
        }
        .notification-copy { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .notification-copy strong { display: block; margin-bottom: 2px; color: #7c3d0a; font-size: 14px; }
        .notification-btn {
            flex: 0 0 auto;
            padding: 9px 12px;
            border: 0;
            border-radius: 9px;
            color: #fff;
            background: var(--primary);
            cursor: pointer;
            font-weight: 750;
        }
        .notification-bar.enabled { border-color: #a7f3d0; color: #047857; background: #ecfdf5; }
        .notification-bar.enabled .notification-copy strong { color: #047857; }
        .notification-bar.enabled .notification-btn { color: #047857; background: #d1fae5; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }
        .stat-label { margin: 0 0 8px; color: var(--muted); font-size: 14px; }
        .stat-value { margin: 0; font-size: 28px; line-height: 1; }
        .stat-value.revenue { color: var(--primary-dark); }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            padding-bottom: 2px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn {
            flex: 0 0 auto;
            padding: 9px 13px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            font-weight: 650;
            font-size: 14px;
        }
        .filter-btn.active {
            border-color: var(--primary);
            background: #fff4eb;
            color: var(--primary-dark);
        }

        #orders {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 16px;
        }

        .order-card {
            display: flex;
            flex-direction: column;
            padding: 19px;
            border: 1px solid var(--line);
            border-radius: 17px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }
        .order-top { display: flex; justify-content: space-between; gap: 14px; }
        .customer { margin: 0 0 6px; font-size: 18px; }
        .order-time { color: var(--muted); font-size: 13px; }
        .table-number {
            min-width: 58px;
            height: 58px;
            display: grid;
            place-items: center;
            align-content: center;
            border-radius: 14px;
            background: #fff4eb;
            color: var(--primary-dark);
            font-size: 12px;
            font-weight: 700;
        }
        .table-number strong { display: block; font-size: 20px; line-height: 1.05; }

        .status {
            align-self: flex-start;
            margin: 15px 0 12px;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }
        .status.pending { color: #92400e; background: #fef3c7; }
        .status.processing { color: #1d4ed8; background: #dbeafe; }
        .status.completed { color: #047857; background: #d1fae5; }
        .status.paid { color: #6d28d9; background: #ede9fe; }

        .note {
            margin: 0 0 12px;
            padding: 10px 12px;
            border-left: 3px solid #fbbf24;
            border-radius: 8px;
            background: #fffbeb;
            color: #7c5b13;
            font-size: 14px;
        }

        .items { margin: 0; padding: 0; list-style: none; }
        .items li {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px dashed var(--line);
            font-size: 14px;
        }
        .qty { color: var(--muted); font-weight: 700; white-space: nowrap; }

        .order-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-top: auto;
            padding-top: 16px;
        }
        .total small { display: block; color: var(--muted); font-size: 12px; font-weight: 400; }
        .total { color: var(--primary-dark); font-size: 21px; font-weight: 800; }
        .action-btn {
            padding: 11px 15px;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            box-shadow: 0 5px 12px rgba(249, 115, 22, .2);
        }
        .action-btn:hover { background: var(--primary-dark); }

        .empty-state {
            grid-column: 1 / -1;
            padding: 50px 20px;
            border: 1px dashed #cfd4dc;
            border-radius: 16px;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 255, 255, .65);
        }
        .empty-state span { display: block; margin-bottom: 8px; font-size: 34px; }

        @media (max-width: 600px) {
            .header-inner, main { width: min(100% - 24px, 1180px); }
            .header-inner { min-height: 68px; }
            .brand p { display: none; }
            .brand h1 { font-size: 18px; }
            .brand-icon { width: 38px; height: 38px; }
            .header-btn { padding: 10px 12px; font-size: 13px; }
            main { padding-top: 20px; }
            .page-heading { align-items: center; }
            .page-heading h2 { font-size: 21px; }
            .page-heading p { display: none; }
            .notification-bar { align-items: flex-start; padding: 11px 12px; }
            .notification-copy { font-size: 11px; }
            .notification-copy strong { font-size: 13px; }
            .notification-btn { padding: 8px 9px; font-size: 11px; }
            .dashboard { gap: 10px; }
            .stat-card { padding: 16px; border-radius: 14px; }
            .stat-value { font-size: 23px; }
            #orders { grid-template-columns: 1fr; }
            .order-card { padding: 16px; }
            .order-footer { align-items: flex-end; }
            .action-btn { min-height: 44px; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">🍽️</div>
                <div>
                    <h1>Quản lý đơn hàng</h1>
                    <p>Theo dõi và xử lý đơn theo thời gian thực</p>
                </div>
            </div>
            <button class="header-btn" onclick="location.href='/menu-admin.html'">Quản lý thực đơn</button>
        </div>
    </header>

    <main>
        <div class="page-heading">
            <div>
                <h2>Đơn hàng hôm nay</h2>
                <p>Cập nhật trạng thái để nhân viên dễ dàng theo dõi.</p>
            </div>
            <button class="refresh-btn" onclick="loadOrders()">↻ Làm mới</button>
        </div>

        <section class="notification-bar" id="notificationBar">
            <div class="notification-copy"><span>🔔</span><div><strong id="notificationTitle">Bật thông báo đơn mới</strong><span id="notificationText">Nhận chuông và thông báo trên điện thoại khi có khách đặt món.</span></div></div>
            <button class="notification-btn" id="notificationBtn" onclick="enableNotifications()">Bật ngay</button>
        </section>

        <section class="dashboard" aria-label="Thống kê">
            <article class="stat-card">
                <p class="stat-label">Tổng đơn hàng</p>
                <h3 class="stat-value" id="countOrder">0</h3>
            </article>
            <article class="stat-card">
                <p class="stat-label">Doanh thu đã thu</p>
                <h3 class="stat-value revenue" id="totalMoney">0 đ</h3>
            </article>
        </section>

        <nav class="filters" aria-label="Lọc đơn hàng">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="pending">Chờ xác nhận</button>
            <button class="filter-btn" data-filter="processing">Đang chế biến</button>
            <button class="filter-btn" data-filter="completed">Hoàn thành</button>
            <button class="filter-btn" data-filter="paid">Đã thanh toán</button>
        </nav>

        <section id="orders" aria-live="polite">
            <div class="empty-state"><span>⏳</span>Đang tải đơn hàng...</div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ reconnection: true, reconnectionAttempts: Infinity });
        let allOrders = [];
        let currentFilter = "all";
        let hasLoadedOrders = false;
        let knownOrderIds = new Set();
        let notificationRegistration = null;
        let audioContext = null;

        const escapeHtml = (value = "") => String(value).replace(/[&<>'"]/g, char => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
        })[char]);

        document.querySelectorAll(".filter-btn").forEach(button => {
            button.addEventListener("click", () => {
                currentFilter = button.dataset.filter;
                document.querySelectorAll(".filter-btn").forEach(item => item.classList.toggle("active", item === button));
                renderOrders();
            });
        });

        async function loadOrders() {
            const orders = document.getElementById("orders");
            try {
                const res = await fetch("/api/orders");
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (hasLoadedOrders) {
                    data.filter(order => order._id && !knownOrderIds.has(String(order._id)))
                        .forEach(notifyNewOrder);
                }
                knownOrderIds = new Set(data.map(order => String(order._id || "")));
                hasLoadedOrders = true;
                allOrders = data;
                document.getElementById("countOrder").textContent = allOrders.length;
                const money = allOrders
                    .filter(order => order.status === "paid")
                    .reduce((sum, order) => sum + Number(order.total || 0), 0);
                document.getElementById("totalMoney").textContent = money.toLocaleString("vi-VN") + " đ";
                renderOrders();
            } catch {
                orders.innerHTML = '<div class="empty-state"><span>⚠️</span>Không tải được đơn hàng. Vui lòng thử lại.</div>';
            }
        }

        function renderOrders() {
            const filtered = currentFilter === "all"
                ? allOrders
                : allOrders.filter(order => order.status === currentFilter);

            if (!filtered.length) {
                document.getElementById("orders").innerHTML = '<div class="empty-state"><span>📋</span>Chưa có đơn hàng trong mục này.</div>';
                return;
            }

            document.getElementById("orders").innerHTML = filtered.map(order => {
                const action = actionFor(order);
                const items = Array.isArray(order.items) ? order.items : [];
                return `
                    <article class="order-card">
                        <div class="order-top">
                            <div>
                                <h3 class="customer">${escapeHtml(order.customer || "Khách hàng")}</h3>
                                <div class="order-time">${escapeHtml(order.date)} · ${escapeHtml(order.time)}</div>
                            </div>
                            <div class="table-number">BÀN<strong>${escapeHtml(order.table)}</strong></div>
                        </div>
                        <div class="status ${escapeHtml(order.status)}">${statusText(order.status)}</div>
                        ${order.note ? `<p class="note">📝 ${escapeHtml(order.note)}</p>` : ""}
                        <ul class="items">
                            ${items.map(item => `<li><span>${escapeHtml(item.name)}</span><span class="qty">× ${escapeHtml(item.qty)}</span></li>`).join("")}
                        </ul>
                        <div class="order-footer">
                            <div class="total"><small>Tổng thanh toán</small>${Number(order.total || 0).toLocaleString("vi-VN")} đ</div>
                            ${action}
                        </div>
                    </article>`;
            }).join("");
        }

        function actionFor(order) {
            const id = JSON.stringify(String(order._id || ""));
            if (order.status === "pending") return `<button class="action-btn" onclick='changeStatus(${id}, "processing")'>Xác nhận đơn</button>`;
            if (order.status === "processing") return `<button class="action-btn" onclick='changeStatus(${id}, "completed")'>Hoàn thành</button>`;
            if (order.status === "completed") return `<button class="action-btn" onclick='changeStatus(${id}, "paid")'>Thanh toán</button>`;
            return "";
        }

        function statusText(status) {
            return ({
                pending: "● Chờ xác nhận",
                processing: "● Đang chế biến",
                completed: "● Hoàn thành",
                paid: "● Đã thanh toán"
            })[status] || "● Chờ xác nhận";
        }

        async function changeStatus(id, status) {
            const res = await fetch(`/api/orders/${encodeURIComponent(id)}/status`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status })
            });
            if (res.ok) loadOrders();
        }

        async function setupNotifications() {
            if (!("serviceWorker" in navigator)) {
                setNotificationState("unsupported");
                return;
            }
            try {
                notificationRegistration = await navigator.serviceWorker.register("/admin-sw.js");
                if (!("Notification" in window)) {
                    setNotificationState("unsupported");
                    return;
                }
                setNotificationState(Notification.permission);
            } catch {
                setNotificationState("unsupported");
            }
        }

        async function enableNotifications() {
            unlockAudio();
            if (!("Notification" in window)) return setNotificationState("unsupported");
            if (Notification.permission === "denied") {
                setNotificationState("denied");
                alert("Thông báo đang bị chặn. Hãy mở cài đặt trang web trên điện thoại và cho phép Thông báo.");
                return;
            }
            const permission = await Notification.requestPermission();
            setNotificationState(permission);
            if (permission === "granted" && notificationRegistration) {
                notificationRegistration.showNotification("Đã bật thông báo", {
                    body: "Điện thoại sẽ báo khi có đơn mới trong lúc trang admin đang hoạt động.",
                    tag: "notification-enabled",
                    data: { url: "/admin.html" }
                });
            }
        }

        function setNotificationState(state) {
            const bar = document.getElementById("notificationBar");
            const title = document.getElementById("notificationTitle");
            const text = document.getElementById("notificationText");
            const button = document.getElementById("notificationBtn");
            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isStandalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
            button.style.display = "block";
            bar.classList.toggle("enabled", state === "granted");
            if (state === "granted") {
                title.textContent = "Thông báo đã được bật";
                text.textContent = "Đang chờ đơn mới từ khách hàng.";
                button.textContent = "Đã bật ✓";
            } else if (state === "denied") {
                title.textContent = "Thông báo đang bị chặn";
                text.textContent = "Cho phép thông báo trong cài đặt trình duyệt.";
                button.textContent = "Cách bật";
            } else if (state === "unsupported") {
                if (isIOS && !isStandalone) {
                    title.textContent = "Cần mở dưới dạng ứng dụng";
                    text.textContent = "Xóa biểu tượng cũ, thêm lại vào Màn hình chính rồi mở từ biểu tượng mới.";
                } else if (isIOS) {
                    title.textContent = "Phiên bản iPhone chưa hỗ trợ";
                    text.textContent = "Thông báo web yêu cầu iOS hoặc iPadOS 16.4 trở lên.";
                } else {
                    title.textContent = "Trình duyệt chưa hỗ trợ thông báo";
                    text.textContent = "Hãy mở trang bằng Chrome hoặc Safari phiên bản mới.";
                }
                button.style.display = "none";
            }
        }

        function unlockAudio() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;
            if (!audioContext) audioContext = new AudioCtx();
            if (audioContext.state === "suspended") audioContext.resume().catch(() => {});
        }

        function playNotificationSound() {
            if (!audioContext || audioContext.state !== "running") return;
            [0, .22].forEach(delay => {
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                oscillator.type = "sine";
                oscillator.frequency.value = delay ? 880 : 660;
                gain.gain.setValueAtTime(.18, audioContext.currentTime + delay);
                gain.gain.exponentialRampToValueAtTime(.001, audioContext.currentTime + delay + .18);
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                oscillator.start(audioContext.currentTime + delay);
                oscillator.stop(audioContext.currentTime + delay + .2);
            });
        }

        async function notifyNewOrder(order) {
            if (!order) return;
            if (order._id) knownOrderIds.add(String(order._id));
            playNotificationSound();
            const body = `Bàn ${order.table || "-"} · ${order.customer || "Khách hàng"}${order.note ? ` · ${order.note}` : ""}`;
            if ("Notification" in window && Notification.permission === "granted" && notificationRegistration) {
                await notificationRegistration.showNotification("🔔 Có đơn hàng mới", {
                    body,
                    tag: `order-${order._id || Date.now()}`,
                    renotify: true,
                    vibrate: [200, 100, 200],
                    data: { url: "/admin.html" }
                }).catch(() => {});
            } else if (!document.hidden) {
                alert(`🔔 Có đơn mới\nBàn: ${order.table}\nKhách: ${order.customer}`);
            }
        }

        socket.on("newOrder", data => {
            notifyNewOrder(data.order);
            loadOrders();
        });
        socket.on("order-status", loadOrders);
        setupNotifications();
        loadOrders();
        setInterval(loadOrders, 15000);
    </script>
</body>
</html>
