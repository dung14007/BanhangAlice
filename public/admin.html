<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            margin: 0;
            background: #f5f5f5;
        }

        h1 {
            margin: 0;
            padding: 20px;
            background: #ff6b00;
            color: white;
            text-align: center;
        }

        #orders {
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }
        .status{

    padding:10px;

    border-radius:8px;

    margin:10px 0;

    font-weight:bold;

    color:white;

}

.pending{

    background:#ffc107;

}

.processing{

    background:#0d6efd;

}

.completed{

    background:#198754;

}

.paid{

    background:#6f42c1;

}
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #ff6b00;
        }

        ul{
            padding-left:20px;
        }

        .total{
            font-size:18px;
            color:red;
            font-weight:bold;
        }
        .top-bar{
    display:flex;
    justify-content:flex-end;
    padding:15px 20px;
}

.menu-btn{
    background:#198754;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.25s;
}

.menu-btn:hover{
    background:#157347;
    transform:translateY(-2px);
}
    </style>

</head>

<body>

<h1>🍽️ Đơn hàng</h1>
<div class="top-bar">
    <button onclick="location.href='/menu-admin.html'" class="menu-btn">
        🍽️ Quản lý thực đơn
    </button>
</div>
<div style="text-align:center;margin:15px">

<button onclick="loadOrders()">

🔄 Làm mới

</button>

</div>
<div style="display:flex;gap:10px;justify-content:center;margin:20px">

<div class="card" style="width:180px;text-align:center">

<h3 id="countOrder">0</h3>

<p>Tổng đơn</p>

</div>

<div class="card" style="width:180px;text-align:center">

<h3 id="totalMoney">0đ</h3>

<p>Doanh thu</p>

</div>

</div>
<div id="orders"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
socket.on("newOrder", (data)=>{


    console.log("Đơn mới:", data);


    alert(
        "🔔 Có đơn mới\n"+
        "Bàn: "+data.order.table+
        "\nKhách: "+data.order.customer
    );


    loadOrders(); // cập nhật danh sách đơn

});
const audio = new Audio(
    "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
);

async function loadOrders() {

    const res = await fetch("/api/orders");

        if(!res.ok){

            alert("Không tải được đơn hàng");

            return;

        }
        const data = await res.json();
        document.getElementById("countOrder").innerHTML=data.length;

    const money=data
    .filter(o=>o.status==="paid")
    .reduce((s,o)=>s+o.total,0);

    document.getElementById("totalMoney").innerHTML=
    money.toLocaleString()+"đ";
    
        console.log(data);
    let html = "";

    data.forEach(order => {

        let actionButton = "";

        if (order.status === "pending") {
            actionButton = `
                <button onclick="changeStatus('${order._id}','processing')">
                    ✔ Xác nhận
                </button>
            `;
        } else if (order.status === "processing") {
            actionButton = `
                <button onclick="changeStatus('${order._id}','completed')">
                    🍳 Hoàn thành
                </button>
            `;
        } else if (order.status === "completed") {
            actionButton = `
                <button onclick="changeStatus('${order._id}','paid')">
                    💰 Đã thanh toán
                </button>
            `;
        }

        html += `
        <div class="card">

            <div class="title">
                👤 ${order.customer}
            </div>

            <div class="title">
                🪑 Bàn ${order.table}
            </div>

            <div style="font-size:14px;color:#666;margin:8px 0;">
                📅 ${order.date} &nbsp; 🕒 ${order.time}
            </div>

            <p>${order.note || ""}</p>

            <div class="status ${order.status}">

                    ${statusText(order.status)}

                </div>

            <ul>
                ${order.items.map(item => `
                    <li>${item.name} x ${item.qty}</li>
                `).join("")}
            </ul>

            <div class="total">
                ${Number(order.total).toLocaleString()} đ
            </div>

            <div style="margin-top:15px">
                ${actionButton}
            </div>

        </div>
        `;

    });

    document.getElementById("orders").innerHTML = html;

}

loadOrders();

socket.on("new-order",()=>{

    audio.play().catch(()=>{});

    loadOrders();

});
socket.on("order-status",()=>{

    loadOrders();

});
function statusText(status){

    switch(status){

        case "pending":
            return "🟡 Chờ xác nhận";

        case "processing":
            return "🔵 Đang chế biến";

        case "completed":
            return "🟢 Hoàn thành";

        case "paid":
            return "💰 Đã thanh toán";

        default:
            return "🟡 Chờ xác nhận";

    }

}
async function changeStatus(id,status){

    const res = await fetch(`/api/orders/${id}/status`,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            status
        })

    });

    if(res.ok){

        loadOrders();

    }

}
</script>


</body>

</html>
