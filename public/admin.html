<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    margin:0;
    background:#f1f3f5;
}


/* HEADER */

h1{
    background:#ff6b00;
    color:white;
    margin:0;
    padding:18px;
    text-align:center;
    font-size:22px;
}


/* BUTTON */

button{
    border:0;
    border-radius:12px;
    padding:14px;
    font-weight:700;
    font-size:15px;
}


/* MENU */

.top-bar{
    padding:10px;
}


.menu-btn{
    width:100%;
    background:#198754;
    color:white;
}


/* ORDERS */

#orders{
    padding:12px;
}


.card{

    background:white;

    border-radius:18px;

    padding:16px;

    margin-bottom:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

}


/* khách */

.title{

    font-size:18px;

    font-weight:700;

    color:#333;

    margin-bottom:5px;

}



/* thời gian */

.card div[style]{

    font-size:12px!important;

}



/* trạng thái */

.status{

    text-align:center;

    padding:10px;

    border-radius:20px;

    margin:12px 0;

    color:white;

    font-weight:bold;

}



.pending{

    background:#ffb703;

}



.processing{

    background:#0077ff;

}



.completed{

    background:#00a86b;

}



.paid{

    background:#6f42c1;

}



/* món ăn */

ul{

    background:#f8f9fa;

    border-radius:12px;

    padding:12px 25px;

}


li{

    padding:6px;

    font-size:15px;

}



/* tiền */

.total{

    font-size:22px;

    color:#e53935;

    margin:12px 0;

}



/* nút xử lý */

.card button{

    width:100%;

    background:#ff6b00;

    color:white;

}

/* MOBILE RESPONSIVE */
@media (max-width:600px){

    body{
        background:#f5f5f5;
    }


    h1{
        font-size:26px;
        padding:22px 10px;
    }


    .top-bar{
        padding:15px;
    }


    .menu-btn{
        height:55px;
        font-size:18px;
        border-radius:15px;
    }


    /* nút làm mới */
    button{
        min-height:55px;
        font-size:17px;
    }


    /* thống kê */
    body > div[style*="display:flex"]{

        flex-direction:column;
        margin:15px!important;
        gap:15px!important;

    }


    body > div[style*="display:flex"] .card{

        width:100%!important;
        padding:20px;

    }


    #countOrder,
    #totalMoney{

        font-size:30px;

    }


    /* danh sách đơn */

    #orders{

        padding:15px;

    }


    .card{

        border-radius:22px;
        padding:20px;
        margin-bottom:20px;

        box-shadow:
        0 6px 20px rgba(0,0,0,.12);

    }


    .title{

        font-size:22px;
        margin-bottom:10px;

    }


    .card div[style]{

        font-size:16px!important;

    }


    .status{

        font-size:18px;
        padding:14px;
        margin:15px 0;

    }


    ul{

        padding:15px 30px;
        margin:15px 0;

    }


    li{

        font-size:18px;
        padding:10px 0;

    }


    .total{

        font-size:28px;
        font-weight:800;

    }


    .card button{

        height:60px;
        font-size:18px;
        border-radius:15px;

    }


    #orders p{

        font-size:17px;

    }

}
.dashboard{
    display:flex;
    gap:10px;
    justify-content:center;
    margin:20px;
}
    </style>

</head>

<body>

<h1>🍽️ Đơn hàng</h1>
<div class="top-bar">
    <button onclick="location.href='/menu-admin.html'" class="menu-btn">
        🍽️ Quản lý thực đơn
    </button>
</div>
<div style="text-align:center;margin:15px">

<button onclick="loadOrders()">

🔄 Làm mới

</button>

</div>
<div class="dashboard">

<div class="card" style="width:180px;text-align:center">

<h3 id="countOrder">0</h3>

<p>Tổng đơn</p>

</div>

<div class="card" style="width:180px;text-align:center">

<h3 id="totalMoney">0đ</h3>

<p>Doanh thu</p>

</div>

</div>
<div id="orders"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
socket.on("newOrder", (data)=>{


    console.log("Đơn mới:", data);


    alert(
        "🔔 Có đơn mới\n"+
        "Bàn: "+data.order.table+
        "\nKhách: "+data.order.customer
    );


    loadOrders(); // cập nhật danh sách đơn

});
const audio = new Audio(
    "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
);

async function loadOrders() {

    const res = await fetch("/api/orders");

        if(!res.ok){

            alert("Không tải được đơn hàng");

            return;

        }
        const data = await res.json();
        document.getElementById("countOrder").innerHTML=data.length;

    const money=data
    .filter(o=>o.status==="paid")
    .reduce((s,o)=>s+o.total,0);

    document.getElementById("totalMoney").innerHTML=
    money.toLocaleString()+"đ";
    
        console.log(data);
    let html = "";

    data.forEach(order => {

        let actionButton = "";

        if (order.status === "pending") {
            actionButton = `
                <button onclick="changeStatus('${order._id}','processing')">
                    ✔ Xác nhận
                </button>
            `;
        } else if (order.status === "processing") {
            actionButton = `
                <button onclick="changeStatus('${order._id}','completed')">
                    🍳 Hoàn thành
                </button>
            `;
        } else if (order.status === "completed") {
            actionButton = `
                <button onclick="changeStatus('${order._id}','paid')">
                    💰 Đã thanh toán
                </button>
            `;
        }

        html += `
        <div class="card">

            <div class="title">
                👤 ${order.customer}
            </div>

            <div class="title">
                🪑 Bàn ${order.table}
            </div>

            <div style="font-size:14px;color:#666;margin:8px 0;">
                📅 ${order.date} &nbsp; 🕒 ${order.time}
            </div>

            <p>${order.note || ""}</p>

            <div class="status ${order.status}">

                    ${statusText(order.status)}

                </div>

            <ul>
                ${order.items.map(item => `
                    <li>${item.name} x ${item.qty}</li>
                `).join("")}
            </ul>

            <div class="total">
                ${Number(order.total).toLocaleString()} đ
            </div>

            <div style="margin-top:15px">
                ${actionButton}
            </div>

        </div>
        `;

    });

    document.getElementById("orders").innerHTML = html;

}

loadOrders();

socket.on("new-order",()=>{

    audio.play().catch(()=>{});

    loadOrders();

});
socket.on("order-status",()=>{

    loadOrders();

});
function statusText(status){

    switch(status){

        case "pending":
            return "🟡 Chờ xác nhận";

        case "processing":
            return "🔵 Đang chế biến";

        case "completed":
            return "🟢 Hoàn thành";

        case "paid":
            return "💰 Đã thanh toán";

        default:
            return "🟡 Chờ xác nhận";

    }

}
async function changeStatus(id,status){

    const res = await fetch(`/api/orders/${id}/status`,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            status
        })

    });

    if(res.ok){

        loadOrders();

    }

}
</script>


</body>

</html>
